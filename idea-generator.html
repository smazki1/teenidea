<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחשבון רעיונות לנוער</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Assistant', 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .gradient-text {
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #764ba2;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center">

    <div class="max-w-3xl w-full">
        <div class="glass-card p-6 md:p-10 transition-all duration-500">
            <!-- Header -->
            <header class="text-center mb-10">
                <h1 class="text-4xl md:text-5xl font-bold gradient-text mb-4">יוצר הרעיונות</h1>
                <p class="text-gray-600 text-lg">מחפש את האפליקציה הגדולה הבאה? לחץ על הכפתור וקבל השראה!</p>
            </header>

            <!-- Action Button -->
            <div class="flex justify-center mb-8">
                <button id="generateBtn" onclick="generateIdea()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-10 rounded-full transition-transform transform hover:scale-105 shadow-lg flex items-center gap-2">
                    <span id="btnText">תמציא לי רעיון!</span>
                    <svg id="sparkleIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </button>
            </div>

            <!-- Loading State -->
            <div id="loading" class="hidden flex-col items-center justify-center py-10">
                <div class="loader mb-4"></div>
                <p class="text-indigo-600 font-medium animate-pulse">הבינה המלאכותית חושבת על משהו גאוני...</p>
            </div>

            <!-- Result Area -->
            <div id="result" class="hidden animate-in fade-in duration-700">
                <div class="border-t border-gray-100 pt-8 mt-4">
                    <div class="flex flex-col md:flex-row gap-8">
                        <!-- Image Container -->
                        <div class="w-full md:w-1/2">
                            <div id="imagePlaceholder" class="aspect-square rounded-2xl overflow-hidden shadow-md bg-gray-100 flex items-center justify-center border-2 border-dashed border-gray-300">
                                <span class="text-gray-400 text-center px-4">מעבד תמונה...</span>
                            </div>
                            <img id="generatedImage" class="hidden w-full h-auto rounded-2xl shadow-xl hover:scale-[1.02] transition-transform" src="" alt="App visual">
                        </div>

                        <!-- Text Content -->
                        <div class="w-full md:w-1/2 flex flex-col justify-center">
                            <h2 id="ideaTitle" class="text-3xl font-bold text-gray-800 mb-4 leading-tight"></h2>
                            <div id="ideaDescription" class="text-gray-600 text-lg leading-relaxed space-y-4"></div>
                            
                            <!-- Share/Action -->
                            <div class="mt-8 flex gap-3">
                                <button onclick="copyToClipboard()" class="text-sm font-medium text-indigo-600 bg-indigo-50 px-4 py-2 rounded-lg hover:bg-indigo-100 transition">
                                    העתק תיאור
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-8 text-center text-white/80 text-sm">
            נוצר עבור מפתחי העתיד 🚀 | מופעל על ידי Gemini & Imagen
        </footer>
    </div>

    <script>
        const apiKey = ""; // API key is handled by the environment

        async function generateIdea() {
            const btn = document.getElementById('generateBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const imagePlaceholder = document.getElementById('imagePlaceholder');
            const generatedImage = document.getElementById('generatedImage');

            // UI State Reset
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            loading.classList.remove('hidden');
            loading.classList.add('flex');
            result.classList.add('hidden');
            generatedImage.classList.add('hidden');
            imagePlaceholder.classList.remove('hidden');

            try {
                const systemPrompt = "אתה מומחה לאסטרטגיית מוצר ואפליקציות. תפקידך להמציא רעיון לאפליקציה חדשנית, מגניבה ושימושית לבני נוער (גילאי 13-18). החזר תגובה בפורמט JSON בלבד עם המפתחות: title (שם האפליקציה בעברית), description (תיאור מפורט בעברית של 2-3 פסקאות על מה האפליקציה עושה ולמה היא טובה), ו-imagePrompt (פרומפט באנגלית לתיאור ויזואלי של האפליקציה עבור מודל יצירת תמונות).";
                const userQuery = "תן לי רעיון לאפליקציה מקורית לבני נוער.";

                const textResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: userQuery }] }],
                        systemInstruction: { parts: [{ text: systemPrompt }] },
                        generationConfig: { responseMimeType: "application/json" }
                    })
                });

                const textData = await textResponse.json();
                const idea = JSON.parse(textData.candidates[0].content.parts[0].text);

                // Update Text Content
                document.getElementById('ideaTitle').innerText = idea.title;
                document.getElementById('ideaDescription').innerText = idea.description;
                
                loading.classList.add('hidden');
                loading.classList.remove('flex');
                result.classList.remove('hidden');

                await generateAppImage(idea.imagePrompt);

            } catch (error) {
                console.error("Error generating idea:", error);
                loading.classList.add('hidden');
                loading.classList.remove('flex');
                alert("משהו השתבש... נסה שוב בעוד רגע.");
            } finally {
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        async function generateAppImage(prompt) {
            const imagePlaceholder = document.getElementById('imagePlaceholder');
            const generatedImage = document.getElementById('generatedImage');

            try {
                const payload = { 
                    instances: { 
                        prompt: `A modern, high-quality UI/UX design mockup of a mobile app for teenagers, ${prompt}, vibrant colors, clean aesthetic, 3d render style, professional app store presentation` 
                    }, 
                    parameters: { "sampleCount": 1 } 
                };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                
                if (result.predictions && result.predictions.length > 0) {
                    const base64Data = result.predictions[0].bytesBase64Encoded;
                    generatedImage.src = `data:image/png;base64,${base64Data}`;
                    generatedImage.classList.remove('hidden');
                    imagePlaceholder.classList.add('hidden');
                }
            } catch (error) {
                console.error("Image generation failed:", error);
                imagePlaceholder.innerHTML = '<span class="text-red-400 text-center px-4">לא הצלחנו ליצור תמונה, אבל הרעיון עדיין פגז!</span>';
            }
        }

        function copyToClipboard() {
            const title = document.getElementById('ideaTitle').innerText;
            const desc = document.getElementById('ideaDescription').innerText;
            const fullText = `${title}\n\n${desc}`;
            
            navigator.clipboard.writeText(fullText).catch(() => {
                const el = document.createElement('textarea');
                el.value = fullText;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
            });
            
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "הועתק! ✅";
            setTimeout(() => btn.innerText = originalText, 2000);
        }
    </script>
</body>
</html>
